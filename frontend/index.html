<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#09090b" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lotus Finance — personal budgeting, owned by you." />
    <!-- Social preview card (1200×630). To swap variants, change the filename
         below to og-image-logo.png, og-image-wordmark.png, or og-image-tagline.png. -->
    <meta property="og:title" content="Lotus Finance" />
    <meta property="og:description" content="Budget. Bloom. Balance." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lotus-finance.me/" />
    <meta property="og:image" content="https://lotus-finance.me/og-image-tagline.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://lotus-finance.me/og-image-tagline.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('lotus.accessibility.v1') || '{}');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var palette = s.palette || (prefersLight ? 'light' : 'dark');
          var rm = s.reduceMotion || 'auto';
          var reduce = rm === 'on' || (rm === 'auto' &&
            window.matchMedia('(prefers-reduced-motion: reduce)').matches);
          var html = document.documentElement;
          html.dataset.palette = palette;
          html.dataset.handedness = s.handedness || 'right';
          html.dataset.textScale = s.textScale || 'md';
          if (reduce) html.dataset.reduceMotion = 'on';
        } catch (e) { /* defaults via CSS */ }
      })();
    </script>
    <title>Lotus Finance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
