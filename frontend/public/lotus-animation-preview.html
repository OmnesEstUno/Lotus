<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotus animation prototype</title>
  <!--
    Lotus splash animation prototype (Task 1).
    Standalone HTML — no React, no build step. Open at /lotus-animation-preview.html
    via the Vite dev server to evaluate the visual.

    Cross-browser note: per the design spec the main risk is Safari's historical
    weakness with SVG <animate attributeName="d"> path interpolation. Tested in
    whichever browsers are available locally; Safari verification is deferred to
    the user (we don't have Safari available in this environment).
  -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #818cf8;
      --border: #27272a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }
    .controls {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      font-size: 14px;
    }
    .controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .controls button {
      background: var(--accent);
      color: #09090b;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    .controls button:hover { opacity: 0.9; }
    .controls .info {
      color: var(--muted);
      font-size: 12px;
      margin-left: auto;
    }
    .controls input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 60px 16px 16px;
    }

    .splash {
      transition: opacity 200ms ease-out;
      opacity: 1;
    }
    .splash.fading { opacity: 0; }

    /* Bloom + spin are both driven by SVG <animateTransform> elements (in
       viewBox user coordinates) injected by JS — see #flower below. CSS only
       handles fade-out and the reduce-motion pulse.

       Cascade is OVERLAPPING: the leader pair (rightmost / path13+path16)
       starts rotating at t=0 and keeps rotating until t=4T. Pair 4 begins
       morphing at t=0 in parallel; once morphed (t=T), it ALSO starts
       rotating and continues until t=4T — so pair 5 is still mid-rotation
       when pair 4 joins. Same pattern for pairs 3 and 2. Pair 1 is the
       anchor: it morphs in place over [3T, 4T] and never rotates during
       bloom. Continuous post-bloom spin: 2.667s/revolution. */
    .splash svg {
      width: 256px;
      height: auto;
      display: block;
    }

    /* Reduce-motion fallback: kill all SVG animations, force bloomed pose,
       gentle opacity pulse on the splash. */
    html[data-reduce-motion="on"] .splash svg animate,
    html[data-reduce-motion="on"] .splash svg animateTransform {
      display: none;
    }
    @keyframes lotus-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    html[data-reduce-motion="on"] .splash {
      animation: lotus-pulse 2s ease-in-out infinite;
    }

    /* Visual-fidelity overlay: shows originals (green) over reauthored (red) when toggled.
       Both at 50% opacity. At rest they should overlap perfectly.
       SMIL animations are hidden so the at-rest layout stays stable while comparing. */
    .splash svg .overlay { display: none; }
    body.overlay-on .splash svg .overlay { display: inline; }
    body.overlay-on .splash svg animate,
    body.overlay-on .splash svg animateTransform { display: none; }

    .console-out {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 16px;
      background: rgba(9, 9, 11, 0.85);
      border-top: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--muted);
      max-height: 25vh;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="stopBtn" type="button">Stop loading (fade out)</button>
    <label><input type="checkbox" id="reduceMotionToggle" /> Enable reduce-motion</label>
    <label><input type="checkbox" id="overlayToggle" /> Visual fidelity overlay (red=reauthored, green=original)</label>
    <span class="info">Lotus splash prototype</span>
  </div>

  <main>
    <div class="splash" id="splash">
      <!-- The SVG is built by JS so we can keep the path-data and animation values
           in one place (and so we can re-use the data for the overlay/diff check). -->
      <svg
        id="lotusSvg"
        viewBox="0 0 180 120"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Loading"
        role="img">
        <g id="flower" fill="#818cf8">
          <!-- petal-pair groups injected here by JS -->
        </g>
      </svg>
    </div>
  </main>

  <pre class="console-out" id="consoleOut"></pre>

      { idx: 2, major: 18, minor: 22 },
      { idx: 3, major: 19, minor: 21 },
      { idx: 4, major: 17, minor: 20 },
      { idx: 5, major: 14, minor: 15 }

    // paths. This is the visual base of the petal fan, NOT the SVG bbox center.
    const MAJOR_STARTS = {
      13: { x: 124.76, y: 112.27 },
      18: { x: 89.19,  y: 78.89  },
      19: { x: 80.68,  y: 79.77  },
      17: { x: 68.87,  y: 88.40  },
      14: { x: 45.87,  y: 112.05 }
    };

      // SVG y is flipped vs. math; use atan2 directly — angles increase CW on screen.
      return Math.atan2(pt.y - cy, pt.x - cx) * 180 / Math.PI;

    // that pair's own at-rest angle. After the morph, every pair sits at its
    // own currentAngle (not at pair1Angle). The group rotation then carries
    // the pair from currentAngle to targetAngle CW.
    //
    //   group_rotation = ((targetAngle - currentAngle) mod 360 + 360) mod 360
    //
    // Pair 5 (internal idx 5) is the cascade ANCHOR — its target equals its
    // currentAngle, so its delta is 0 and it doesn't rotate during bloom.
    // The other four pairs spread CW from the anchor at 72° steps.
    //
    // Internal idx mapping (kept from earlier code) is reversed from the
    // user-facing labelling described in the design spec:
    //   internal idx 1 = user "Pair 5" = path13 / path16 (rightmost, leader)
    //   internal idx 2 = user "Pair 4"
    //   internal idx 3 = user "Pair 3"
    //   internal idx 4 = user "Pair 2"
    //   internal idx 5 = user "Pair 1" = path14 / path15 (leftmost, anchor)
    //
    // Targets (CW from anchor):
    //   internal idx 5 (anchor):    +153.7259°
    //   internal idx 4:             +225.7259°
    //   internal idx 3:             +297.7259°
    //   internal idx 2:             +369.7259° (= +9.7259°)
    //   internal idx 1 (leader):    +441.7259° (= +81.7259°)

    // its at-rest M throughout the bloom — no Y motion, no X motion, no
    // rotation, no scale change. The other four pairs scale outward + rotate
    // around the pivot to land at canonical_dist from pivot at angles 72°
    // apart from the anchor's at-rest angle. Tradeoff: the anchor ends up
    // slightly closer to the pivot than the other four (40.15 vs 46.51), so
    // the bloomed lotus is angularly symmetric (72°) but not radially
    // symmetric. If radial symmetry is required, the anchor would need a
    // brief outward catch-up at end-of-bloom (re-introducing some Y motion).

      5: PAIR5_ANGLE,
      4: PAIR5_ANGLE + 72,
      3: PAIR5_ANGLE + 144,
      2: PAIR5_ANGLE + 216,
      1: PAIR5_ANGLE + 288,

      const start = MAJOR_STARTS[p.major];

      // explicitly: with the geometry-shift we don't want the anchor to rotate
      // around the pivot during its catch-up phase (any rotation around pivot
      // would lift M off its at-rest Y temporarily, violating the user's
      // "no Y motion for pair 1" requirement). Instead the anchor's morphed
      // shape is pre-rotated to the target angle directly (see MORPHED below).

    });

    // ===== scalePathD: scale a path's coordinates by `s` about (px, py) =======
    // Used to shrink the canonical-pre-rotated d-string down to a pair's
    // at-rest size so the morphed shape fits in the same area as the partial,
    // not extending across the whole lotus.
    function scalePathD(d, s, px, py) {
      if (s === 1) return d;
      const tokens = d.match(/[MmLlCcZz]|-?\d*\.?\d+(?:e[-+]?\d+)?/g);
      if (!tokens) return d;
      const scaleAbs = (x, y) => [px + s * (x - px), py + s * (y - py)];
      const scaleRel = (dx, dy) => [s * dx, s * dy];
      const out = [];
      let cmd = null;
      let i = 0;
      const num = () => parseFloat(tokens[i++]);
      while (i < tokens.length) {
        const tk = tokens[i];
        if (/^[MmLlCcZz]$/.test(tk)) { cmd = tk; out.push(cmd); i++; continue; }
        if (cmd === "M" || cmd === "L") {
          const x = num(), y = num();
          out.push(...scaleAbs(x, y));
          if (cmd === "M") cmd = "L";
        } else if (cmd === "m" || cmd === "l") {
          const dx = num(), dy = num();
          out.push(...scaleRel(dx, dy));
          if (cmd === "m") cmd = "l";
        } else if (cmd === "C") {
          out.push(...scaleAbs(num(), num()), ...scaleAbs(num(), num()), ...scaleAbs(num(), num()));
        } else if (cmd === "c") {
          out.push(...scaleRel(num(), num()), ...scaleRel(num(), num()), ...scaleRel(num(), num()));
        } else { i++; }
      }
      const fmt = v => typeof v === "string" ? v : Number(v.toFixed(4)).toString();
      return out.map(fmt).join(" ");
    }

    // ===== Per-pair morph-in-place shape data =================================
    // Each pair morphs from its at-rest (REAUTHORED) d to a canonical
    // (path13's d for major, path16's for minor) rigidly rotated so the
    // canonical's M-point lands at the pair's own at-rest angle. This way
    // the morph fills the petal "in place" without sliding angularly across
    // the lotus mid-interpolation. After the morph, the pair's bloom rotation
    // (deltaDeg around the pivot) carries it CW to its bloomed target.
    //
    // SVG path command structure (after the "M x y" prefix, the rest is "c"
    // cubics with relative control deltas + an absolute(ish) endpoint pair —
    // actually all relative). Lowercase c is relative; uppercase C is absolute.
    // Lowercase m after the first M is also relative.
    //
    // To rotate the path:
    //   - Absolute coords (M, L, C with uppercase OR the implicit M-coord at
    //     start): translate to pivot-frame, rotate, translate back.
    //   - Relative coords (m, l, c with lowercase, including the deltas inside
    //     each cubic): rotate the delta vector with no translation.
    //
    // Both REAUTHORED[13] and REAUTHORED[16] start with "M x y" then a series
    // of "c dx1 dy1 dx2 dy2 dx dy" tuples and a trailing "z". We parse the
    // command stream, rotate absolute or relative coord-pairs as appropriate,
    // and rebuild the d-string.
    function rotatePathD(d, deg, pivotX, pivotY) {
      const rad = deg * Math.PI / 180;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);
      const rotAbs = (x, y) => {
        const dx = x - pivotX;
        const dy = y - pivotY;
        return [
          pivotX + dx * cos - dy * sin,
          pivotY + dx * sin + dy * cos,
        ];
      };
      const rotRel = (dx, dy) => [
        dx * cos - dy * sin,
        dx * sin + dy * cos,
      ];

      // Tokenize: split on whitespace AND on command letters (keeping them).
      // Commands we expect in our d-strings: M, m, L, l, C, c, Z, z.
      // Numbers may be negative ("-0.27"), decimal, or scientific. We use a
      // regex tokenizer that yields commands and numbers separately.
      const tokens = d.match(/[MmLlCcZz]|-?\d*\.?\d+(?:e[-+]?\d+)?/g);
      if (!tokens) return d;

      const out = [];
      let i = 0;
      let cmd = null;
      const num = () => parseFloat(tokens[i++]);

      while (i < tokens.length) {
        const tk = tokens[i];
        if (/^[MmLlCcZz]$/.test(tk)) {
          cmd = tk;
          out.push(cmd);
          i++;
          continue;
        }
        // Else tk is a number — interpret per current command.
        if (cmd === "M" || cmd === "L") {
          const x = num(), y = num();
          const [rx, ry] = rotAbs(x, y);
          out.push(rx, ry);
          // Per SVG spec, subsequent coord pairs after M default to L (uppercase).

        } else if (cmd === "m" || cmd === "l") {
          const dx = num(), dy = num();
          const [rdx, rdy] = rotRel(dx, dy);
          out.push(rdx, rdy);
          // Per spec, subsequent pairs after m default to l (lowercase).
          if (cmd === "m") cmd = "l";
        } else if (cmd === "C") {
          // 3 absolute control/endpoints
          const x1 = num(), y1 = num(), x2 = num(), y2 = num(), x = num(), y = num();
          const [rx1, ry1] = rotAbs(x1, y1);
          const [rx2, ry2] = rotAbs(x2, y2);
          const [rx, ry] = rotAbs(x, y);
          out.push(rx1, ry1, rx2, ry2, rx, ry);
        } else if (cmd === "c") {
          // 3 relative control/endpoint deltas
          const dx1 = num(), dy1 = num(), dx2 = num(), dy2 = num(), dx = num(), dy = num();
          const [rdx1, rdy1] = rotRel(dx1, dy1);
          const [rdx2, rdy2] = rotRel(dx2, dy2);
          const [rdx, rdy] = rotRel(dx, dy);
          out.push(rdx1, rdy1, rdx2, rdy2, rdx, rdy);
        } else if (cmd === "Z" || cmd === "z" || cmd === null) {
          // Z takes no params — shouldn't get here as a number, but guard.
          i++;
        } else {
          // Unknown command — skip the number defensively.
          i++;
        }
      }

      // Format with 4-decimal precision (matches REAUTHORED string density).
      const fmt = v => (typeof v === "string" ? v : Number(v.toFixed(4)).toString());
      // Build the string with spaces between tokens; commands stay as letters.
      const parts = [];
      for (const t of out) {
        if (typeof t === "string") parts.push(t);
        else parts.push(fmt(t));
      }
      return parts.join(" ");
    }

    // Per-pair MORPH-IN-PLACE shape: canonical pre-rotated to the pair's at-rest
    // angle, then SCALED about the pivot by sPair = atRestDist / CANONICAL_DIST.
    // The scale brings the canonical's M to exactly the pair's at-rest M, AND
    // shrinks every other point on the path proportionally — so the morphed
    // petal occupies the same general area as the partial petal it's replacing
    // (instead of extending across the whole lotus at full canonical size).
    //
    // After morph, the partial has faded and the morphed (small canonical at
    // at-rest M) is fully visible. The rotation phase then scales the petal
    // up by 1/sPair about the same pivot AND rotates around the pivot — the
    // combined motion is a clean CW outward spiral from at-rest M to the
    // bloomed slot at canonical distance and target angle.
    //
    // Anchor: sEnd = 1 (no scale-up) and delta = 0 (no rotation), so the
    // anchor stays at its at-rest M with at-rest size. Asymmetric in distance
    // (slightly inside the others) but angularly 72°-spaced.
    const MORPHED = {};
    for (const b of blooms) {

      const atRestDist = Math.hypot(start.x - cx, start.y - cy);
      const sPair = atRestDist / CANONICAL_DIST; // < 1 for non-leader, exactly 1 for leader
      const preRotateDeg = b.currentAngle - pair1Angle;
      const preRotMajor = rotatePathD(REAUTHORED[13], preRotateDeg, cx, cy);
      const preRotMinor = rotatePathD(REAUTHORED[16], preRotateDeg, cx, cy);
      // Scale about pivot — canonical M moves from CANONICAL_DIST*unit(currentAngle)
      // to atRestDist*unit(currentAngle) = the pair's at-rest M position. ✓
      const morphMajor = scalePathD(preRotMajor, sPair, cx, cy);
      const morphMinor = scalePathD(preRotMinor, sPair, cx, cy);
      const isAnchor = (b.idx === 5);

      // multiplies into to grow the petal from at-rest size to full canonical.
      // Anchor stays put → sEnd = 1.
      const sEnd = isAnchor ? 1 : (1 / sPair);
      MORPHED[b.idx] = {
        major: morphMajor,
        minor: morphMinor,
        preRotateDeg,
        atRestM: start,
        atRestDist,
        sPair,
        sEnd,
        isAnchor,
      };

    // Internal idx 1 = user "Pair 5" (rightmost leader, fully drawn at rest).
    // Internal idx 5 = user "Pair 1" (leftmost anchor, fills in last).
    //
    // Each NON-leader pair morphs IN PLACE (cross-fade + scale-grow at its
    // own at-rest M — no spatial motion during morph). Once a pair has finished
    // morphing it begins its rotation+outward-translation phase, joining the
    // already-rotating earlier pairs. All five rotation phases end at t = 5T,
    // simultaneously, when every pair has reached its bloomed slot. Global
    // spin then takes over.
    //
    // - t = 0   : idx 1 begins rotating + translating outward.   idx 2 begins morphing in place.
    // - t = T   : idx 2 finishes morph → joins rotation+outward. idx 3 begins morphing.
    // - t = 2T  : idx 3 finishes morph → joins rotation+outward. idx 4 begins morphing.
    // - t = 3T  : idx 4 finishes morph → joins rotation+outward. idx 5 begins morphing.
    // - t = 4T  : idx 5 finishes morph → joins rotation+outward (small catch-up).
    // - t = 5T  : All five pairs reach evenly-spaced 72° bloomed slots
    //             simultaneously. Continuous CW spin takes over.
    //
    //   idx 1: rotateBegin=0,  dur=5T
    //   idx 2: rotateBegin=T,  dur=4T
    //   idx 3: rotateBegin=2T, dur=3T
    //   idx 4: rotateBegin=3T, dur=2T
    //   idx 5: rotateBegin=4T, dur=T   (small catch-up so idx 5 reaches
    //                                   the geometry-shifted bloomed slot
    //                                   at distance CANONICAL_DIST.)
    //
    // With T = 0.3s, total bloom = 5T = 1.5s.
    const T = 0.3;
    const BLOOM_TOTAL_S = 5 * T; // 1.5s
    const ROTATION_BEGIN_BY_IDX = { 1: 0, 2: T, 3: 2 * T, 4: 3 * T, 5: 4 * T };
    const MORPH_BEGIN_BY_IDX    = { 2: 0, 3: T, 4: 2 * T, 5: 3 * T };
    function timingFor(idx) {
      const beginMotionS = ROTATION_BEGIN_BY_IDX[idx]; // every idx now rotates (idx 5 catches up)
      const beginMorphS  = MORPH_BEGIN_BY_IDX[idx];    // undefined for idx 1 (leader)
      const durMotionS   = BLOOM_TOTAL_S - beginMotionS;
      return { beginMotionS, durMotionS, beginMorphS, durMorphS: T };
    }

    // ===== Build the SVG ======================================================
    const SVG_NS = "http://www.w3.org/2000/svg";
    const flower = document.getElementById("flower");
    const svg = document.getElementById("lotusSvg");

    // Continuous spin: an <animateTransform> on the #flower group, rotating
    // 0->360 around the pivot, 2.667s per revolution (= 4 / 1.5 — 1.5x faster
    // than the original 4s), infinite, beginning the instant the cascade bloom
    // finishes (BLOOM_TOTAL_S, ~1.2s).
    const SPIN_DUR_S = 4 / 1.5; // 2.6667
    const spin = document.createElementNS(SVG_NS, "animateTransform");
    spin.setAttribute("attributeName", "transform");
    spin.setAttribute("type", "rotate");
    spin.setAttribute("from", `0 ${cx} ${cy}`);
    spin.setAttribute("to", `360 ${cx} ${cy}`);
    spin.setAttribute("dur", `${SPIN_DUR_S.toFixed(4)}s`);
    spin.setAttribute("begin", `${BLOOM_TOTAL_S.toFixed(4)}s`);
    spin.setAttribute("repeatCount", "indefinite");
    flower.appendChild(spin);

    // For each pair, build a NESTED group structure:
    //
    //   <g class="pair pair-N">              ← outer: rotation about pivot
    //     <animateTransform type="rotate">    (rotation phase)
    //     <g transform="translate(cx cy)">   ← static: shift origin to pivot
    //       <g class="pair-inner">           ← inner: scale-about-origin (= pivot)
    //         <animateTransform type="scale"> (rotation phase: 1 → sEnd)
    //         <g transform="translate(-cx -cy)"> ← static: shift origin back
    //           <path class="partial major"> ← at-rest path-X, fades 1→0 over morph
    //           <path class="partial minor">
    //           <g class="morph-anchor"      ← scale-grow about pair's at-rest M
    //              transform="translate(Mx My)">
    //             <g class="morph-scale">
    //               <animateTransform type="scale">  0 → 1 over morph window
    //               <g transform="translate(-Mx -My)">
    //                 <path class="morphed major"> ← canonical pre-rotated and
    //                                                 SCALED about pivot to fit
    //                                                 at at-rest distance
    //                 <path class="morphed minor">
    //               </g>
    //             </g>
    //           </g>
    //         </g>
    //       </g>
    //     </g>
    //   </g>
    //
    // Effective transform stack on a morphed path's coordinates (innermost first):
    //   1. translate(-Mx -My)         puts pair's at-rest M at origin
    //   2. morph scale(s)             scales 0→1 about origin (= at-rest M)
    //   3. translate(+Mx +My)         origin returns to at-rest M
    //   4. translate(-cx -cy)         shifts origin to pivot
    //   5. inner scale(σ)             scales 1 → sEnd about origin (= pivot)
    //   6. translate(+cx +cy)         shifts origin back
    //   7. outer rotate(δ, pivot)     rotation around pivot
    //
    // The morphed path's d-string already encodes the canonical pre-rotated
    // and scaled by sPair about pivot, so its M sits at the pair's at-rest M
    // and its visible bulk fits in the same area the partial occupied.
    // After morph (steps 1–3 settle at scale 1, full d-string visible), the
    // rotation phase scales the petal up by 1/sPair (= sEnd) about pivot AND
    // rotates around pivot — combined motion is a clean CW outward spiral
    // from at-rest M to the bloomed slot at canonical distance + target angle.
    //
    // ease-out cubic via `keySplines="0.25 0.1 0.25 1"` and `calcMode="spline"`.
    const EASE_OUT_SPLINE = "0.25 0.1 0.25 1";

    function setEase(animEl, beginS, durS) {
      animEl.setAttribute("begin", `${beginS.toFixed(4)}s`);
      animEl.setAttribute("dur", `${durS.toFixed(4)}s`);
      animEl.setAttribute("fill", "freeze");
      animEl.setAttribute("calcMode", "spline");
      animEl.setAttribute("keyTimes", "0;1");
      animEl.setAttribute("keySplines", EASE_OUT_SPLINE);
    }

    for (const b of blooms) {
      const m = MORPHED[b.idx];
      const t = timingFor(b.idx);
      const isLeader = (b.idx === 1);
      const Mx = m.atRestM.x;
      const My = m.atRestM.y;

      // ── Outer pair group: rotation about pivot (rotation phase) ────────
      const pairG = document.createElementNS(SVG_NS, "g");
      pairG.setAttribute("class", "pair pair-" + b.idx);
      pairG.setAttribute("data-pair-rot-end", `rotate(${b.deltaDeg.toFixed(4)} ${cx} ${cy})`);
      const pairRotAT = document.createElementNS(SVG_NS, "animateTransform");
      pairRotAT.setAttribute("attributeName", "transform");
      pairRotAT.setAttribute("type", "rotate");
      pairRotAT.setAttribute("from", `0 ${cx} ${cy}`);
      pairRotAT.setAttribute("to", `${b.deltaDeg.toFixed(4)} ${cx} ${cy}`);
      setEase(pairRotAT, t.beginMotionS, t.durMotionS);
      pairG.appendChild(pairRotAT);

      // ── Pivot translate (static): shift origin to pivot for inner scale ──
      const pivotG = document.createElementNS(SVG_NS, "g");
      pivotG.setAttribute("transform", `translate(${cx} ${cy})`);
      pairG.appendChild(pivotG);

      // ── Inner group: scale-about-origin (= pivot) over rotation phase ───
      // Animates 1 → sEnd. Combined with the outer rotation, this carries the
      // morphed petal's M from at-rest distance up to canonical distance
      // along an arc (CW outward spiral). Anchor: sEnd = 1 → no scaling.
      const innerG = document.createElementNS(SVG_NS, "g");
      innerG.setAttribute("class", "pair-inner");
      innerG.setAttribute("transform", "scale(1)");
      innerG.setAttribute("data-inner-scale-end", `scale(${m.sEnd.toFixed(6)})`);
      const innerScaleAT = document.createElementNS(SVG_NS, "animateTransform");
      innerScaleAT.setAttribute("attributeName", "transform");
      innerScaleAT.setAttribute("type", "scale");
      innerScaleAT.setAttribute("from", "1");
      innerScaleAT.setAttribute("to", `${m.sEnd.toFixed(6)}`);
      setEase(innerScaleAT, t.beginMotionS, t.durMotionS);
      innerG.appendChild(innerScaleAT);
      pivotG.appendChild(innerG);

      // ── Pivot untranslate (static): origin back to global frame ─────────
      const unpivotG = document.createElementNS(SVG_NS, "g");
      unpivotG.setAttribute("transform", `translate(${-cx} ${-cy})`);
      innerG.appendChild(unpivotG);

      if (isLeader) {
        // Leader (path13/16): the canonical at-rest paths sit exactly at the
        // canonical radius already, so the d-string IS the morphed shape.
        const majorPath = document.createElementNS(SVG_NS, "path");
        majorPath.setAttribute("d", REAUTHORED[b.major]);
        majorPath.setAttribute("class", "leader major");
        unpivotG.appendChild(majorPath);
        const minorPath = document.createElementNS(SVG_NS, "path");
        minorPath.setAttribute("d", REAUTHORED[b.minor]);
        minorPath.setAttribute("class", "leader minor");
        unpivotG.appendChild(minorPath);
      } else {
        // Partial paths fading out (1 → 0 over morph window).
        for (const which of ["major", "minor"]) {
          const p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", REAUTHORED[b[which]]);
          p.setAttribute("class", `partial ${which}`);
          p.setAttribute("opacity", "1");
          const fade = document.createElementNS(SVG_NS, "animate");
          fade.setAttribute("attributeName", "opacity");
          fade.setAttribute("from", "1");
          fade.setAttribute("to", "0");
          setEase(fade, t.beginMorphS, t.durMorphS);
          p.appendChild(fade);
          unpivotG.appendChild(p);
        }
        // Morph subtree: scale 0 → 1 about at-rest M, opacity 0 → 1. d-string
        // already encodes a small canonical at at-rest M (canonical-pre-rotated
        // scaled by sPair about pivot), so the morph "fills in" without sliding.
        const anchorG = document.createElementNS(SVG_NS, "g");
        anchorG.setAttribute("class", "morph-anchor");
        anchorG.setAttribute("transform", `translate(${Mx} ${My})`);
        const scaleG = document.createElementNS(SVG_NS, "g");
        scaleG.setAttribute("class", "morph-scale");
        scaleG.setAttribute("transform", "scale(0)");
        scaleG.setAttribute("data-scale-end", "scale(1)");
        const scaleAT = document.createElementNS(SVG_NS, "animateTransform");
        scaleAT.setAttribute("attributeName", "transform");
        scaleAT.setAttribute("type", "scale");
        scaleAT.setAttribute("from", "0");
        scaleAT.setAttribute("to", "1");
        setEase(scaleAT, t.beginMorphS, t.durMorphS);
        scaleG.appendChild(scaleAT);
        const untranslateG = document.createElementNS(SVG_NS, "g");
        untranslateG.setAttribute("transform", `translate(${-Mx} ${-My})`);
        for (const which of ["major", "minor"]) {
          const p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", m[which]);
          p.setAttribute("class", `morphed ${which}`);
          p.setAttribute("opacity", "0");
          const fadeIn = document.createElementNS(SVG_NS, "animate");
          fadeIn.setAttribute("attributeName", "opacity");
          fadeIn.setAttribute("from", "0");
          fadeIn.setAttribute("to", "1");
          setEase(fadeIn, t.beginMorphS, t.durMorphS);
          p.appendChild(fadeIn);
          untranslateG.appendChild(p);
        }
        scaleG.appendChild(untranslateG);
        anchorG.appendChild(scaleG);
        unpivotG.appendChild(anchorG);
      }

      // Visual-fidelity overlay: the unmodified-from-favicon originals shown
      // in green. Lives directly in unpivotG so it inherits all the bloom
      // transforms, but during overlay-mode all SMIL is hidden by CSS.
      const origMajor = document.createElementNS(SVG_NS, "path");
      origMajor.setAttribute("d", ORIGINALS[b.major]);
      origMajor.setAttribute("class", "overlay original-major");
      origMajor.setAttribute("fill", "#22c55e");
      origMajor.setAttribute("opacity", "0.5");
      unpivotG.appendChild(origMajor);
      const origMinor = document.createElementNS(SVG_NS, "path");
      origMinor.setAttribute("d", ORIGINALS[b.minor]);
      origMinor.setAttribute("class", "overlay original-minor");
      origMinor.setAttribute("fill", "#22c55e");
      origMinor.setAttribute("opacity", "0.5");
      unpivotG.appendChild(origMinor);

      flower.appendChild(pairG);
    }

    // When overlay is on, recolor partial + leader paths red @ 0.5 so they
    // overlap the green originals visibly. Hide morphed paths so the
    // partial-vs-original comparison isn't cluttered.
    const overlayStyle = document.createElement("style");
    overlayStyle.textContent = `
      body.overlay-on .splash svg .partial,
      body.overlay-on .splash svg .leader {
        fill: #ef4444 !important;
        opacity: 0.5 !important;
      }
      body.overlay-on .splash svg .morphed {
        display: none;
      }
    `;
    document.head.appendChild(overlayStyle);

    // ===== Reduce-motion: force bloomed pose ==================================
    // When data-reduce-motion=on, we apply each group's static end transform
    // (animateTransforms are hidden by CSS so they don't tween) and flip the
    // partial→morphed opacities. Reverse all of that on toggle-off.
    const reduceMotionStyleApply = () => {
      const on = document.documentElement.dataset.reduceMotion === "on";
      for (const b of blooms) {
        const pairG = flower.querySelector(`.pair-${b.idx}`);
        if (!pairG) continue;
        const innerG = pairG.querySelector(".pair-inner");
        const scaleG = pairG.querySelector(".morph-scale");
        const partials = pairG.querySelectorAll(".partial");
        const morphed = pairG.querySelectorAll(".morphed");
        if (on) {
          pairG.setAttribute("transform", pairG.getAttribute("data-pair-rot-end"));
          if (innerG) innerG.setAttribute("transform", innerG.getAttribute("data-inner-scale-end"));
          if (scaleG) scaleG.setAttribute("transform", scaleG.getAttribute("data-scale-end"));
          partials.forEach(p => p.setAttribute("opacity", "0"));
          morphed.forEach(p => p.setAttribute("opacity", "1"));
        } else {
          pairG.removeAttribute("transform");
          if (innerG) innerG.setAttribute("transform", "scale(1)");
          if (scaleG) scaleG.setAttribute("transform", "scale(0)");
          partials.forEach(p => p.setAttribute("opacity", "1"));
          morphed.forEach(p => p.setAttribute("opacity", "0"));
        }
      }
    };

    // ===== Wiring ==============================================================
    const splash = document.getElementById("splash");
    const stopBtn = document.getElementById("stopBtn");
    const reduceMotionToggle = document.getElementById("reduceMotionToggle");
    const overlayToggle = document.getElementById("overlayToggle");
    const out = document.getElementById("consoleOut");

    function log(...args) {
      const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ");
      out.textContent += line + "\n";
      console.log(...args);
    }

    stopBtn.addEventListener("click", () => {
      splash.classList.toggle("fading");
      stopBtn.textContent = splash.classList.contains("fading")
        ? "Restore (un-fade)"
        : "Stop loading (fade out)";
    });

    reduceMotionToggle.addEventListener("change", () => {
      if (reduceMotionToggle.checked) {
        document.documentElement.dataset.reduceMotion = "on";
      } else {
        delete document.documentElement.dataset.reduceMotion;
      }
      reduceMotionStyleApply();
      if (!reduceMotionToggle.checked) {
        // Replay the bloom + spin from t=0 for review
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    overlayToggle.addEventListener("change", () => {
      document.body.classList.toggle("overlay-on", overlayToggle.checked);
      // When overlay is on, force pairs back to at-rest pose so reauthored vs
      // original can be visually compared. When overlay is off, restart the
      // SVG animations from time 0 so the bloom + spin replay.
      if (overlayToggle.checked) {
        // Force each pair group/rot-group/scale-group back to identity AND
        // partial paths back to opacity 1, so the overlay comparison is at
        // the at-rest pose.
        flower.querySelectorAll(".pair").forEach(g => g.removeAttribute("transform"));
        flower.querySelectorAll(".pair-inner").forEach(g => g.setAttribute("transform", "scale(1)"));
        flower.querySelectorAll(".morph-scale").forEach(g => g.setAttribute("transform", "scale(0)"));
        flower.querySelectorAll(".partial").forEach(p => p.setAttribute("opacity", "1"));
        flower.querySelectorAll(".morphed").forEach(p => p.setAttribute("opacity", "0"));
      } else {
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    // Print computed pivot + per-pair bloom math.
    log("=== Lotus animation prototype ===");
    log(`Pivot (centroid of major-path start points): cx=${cx.toFixed(4)}, cy=${cy.toFixed(4)}`);
    log(`pair1Angle = ${pair1Angle.toFixed(4)}°  (canonical path13's M-point angle from pivot)`);
    log(`PAIR5_ANGLE = ${PAIR5_ANGLE.toFixed(4)}°  (anchor's bloomed angle — chosen so the bloomed M's Y == anchor's at-rest Y)`);
    log(`CANONICAL_DIST = ${CANONICAL_DIST.toFixed(4)}  (every bloomed M sits at this distance from pivot)`);
    log("");
    log("Pair angles + bloom rotation (degrees, SVG coordinate space — +Y is down,");
    log("so +rotation is clockwise on screen). Formula: ((target - currentAngle) mod 360 + 360) mod 360.");
    log("idx 1 LEADS the cascade (rotates from t=0 to t=4T). idx 5 is the ANCHOR — its target equals");
    log("its currentAngle, so its delta is 0 and it does not rotate during bloom.");
    for (const b of blooms) {
      const role = b.idx === 1 ? "  [leader]" : b.idx === 5 ? "  [anchor — no rotation]" : "";
      log(`  idx ${b.idx} (major=path${b.major}, minor=path${b.minor}): current=${b.currentAngle.toFixed(4)}°  target=${b.targetAngle.toFixed(4)}°  cwDelta=${b.deltaDeg.toFixed(4)}°${role}`);
    }
    log("");
    log("Per-pair morph shape sanity check (each pair's morphed major's M should");
    log("land EXACTLY at the pair's at-rest major M — that's the whole point of the");
    log("translatePathD step). Bloom translation = where the pair group ends up");
    log("after its rotation+outward phase, relative to at-rest.");
    function firstMOf(d) {
      const m = d.match(/^\s*M\s*(-?\d*\.?\d+(?:e[-+]?\d+)?)\s+(-?\d*\.?\d+(?:e[-+]?\d+)?)/);
      return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : null;
    }
    for (const b of blooms) {
      const morph = MORPHED[b.idx];
      const m = firstMOf(morph.major);
      const expected = MAJOR_STARTS[b.major];
      log(`  idx ${b.idx}: morph M=(${m.x.toFixed(2)}, ${m.y.toFixed(2)})  vs  path${b.major} M=(${expected.x}, ${expected.y})  | bloomT=(${morph.bloomTx.toFixed(2)}, ${morph.bloomTy.toFixed(2)})`);
    }
    log("");
    log(`Cascade T = ${T.toFixed(4)}s  (total bloom = 5T = ${BLOOM_TOTAL_S.toFixed(4)}s)`);
    log("Per-pair cascade timing (seconds):");
    for (const b of blooms) {
      const tt = timingFor(b.idx);
      const motionStr = `rotate+translate begin=${tt.beginMotionS.toFixed(4)}s dur=${tt.durMotionS.toFixed(4)}s`;
      const morphStr = b.idx === 1
        ? "(no morph — leader is canonical)"
        : `morph begin=${tt.beginMorphS.toFixed(4)}s dur=${tt.durMorphS.toFixed(4)}s`;
      log(`  idx ${b.idx}: ${motionStr} | ${morphStr}`);
    }
    log("");
    log(`Spin: dur=${SPIN_DUR_S.toFixed(4)}s/rev (1.5× original 4s), begin=${BLOOM_TOTAL_S.toFixed(4)}s.`);
  </script>
</body>
</html>
