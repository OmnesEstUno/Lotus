<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotus animation prototype</title>
  <!--
    Lotus splash animation prototype (Task 1).
    Standalone HTML — no React, no build step. Open at /lotus-animation-preview.html
    via the Vite dev server to evaluate the visual.

    Cross-browser note: per the design spec the main risk is Safari's historical
    weakness with SVG <animate attributeName="d"> path interpolation. Tested in
    whichever browsers are available locally; Safari verification is deferred to
    the user (we don't have Safari available in this environment).
  -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #818cf8;
      --border: #27272a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }
    .controls {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      font-size: 14px;
    }
    .controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .controls button {
      background: var(--accent);
      color: #09090b;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    .controls button:hover { opacity: 0.9; }
    .controls .info {
      color: var(--muted);
      font-size: 12px;
      margin-left: auto;
    }
    .controls input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 60px 16px 16px;
    }

    .splash {
      transition: opacity 200ms ease-out;
      opacity: 1;
    }
    .splash.fading { opacity: 0; }

    /* Bloom + spin are both driven by SVG <animateTransform> elements (in
       viewBox user coordinates) injected by JS — see #flower below. CSS only
       handles fade-out and the reduce-motion pulse.

       Spin: 2.667s/revolution (= 4 / 1.5 — 1.5x faster than the original 4s)
       starting at the moment the cascade bloom finishes. The spin's `begin`
       attribute is set in JS based on BLOOM_TOTAL_S so they stay in sync. */
    .splash svg {
      width: 256px;
      height: auto;
      display: block;
    }

    /* Reduce-motion fallback: kill all SVG animations, force bloomed pose,
       gentle opacity pulse on the splash. */
    html[data-reduce-motion="on"] .splash svg animate,
    html[data-reduce-motion="on"] .splash svg animateTransform {
      display: none;
    }
    @keyframes lotus-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    html[data-reduce-motion="on"] .splash {
      animation: lotus-pulse 2s ease-in-out infinite;
    }

    /* Visual-fidelity overlay: shows originals (green) over reauthored (red) when toggled.
       Both at 50% opacity. At rest they should overlap perfectly.
       SMIL animations are hidden so the at-rest layout stays stable while comparing. */
    .splash svg .overlay { display: none; }
    body.overlay-on .splash svg .overlay { display: inline; }
    body.overlay-on .splash svg animate,
    body.overlay-on .splash svg animateTransform { display: none; }

    .console-out {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 16px;
      background: rgba(9, 9, 11, 0.85);
      border-top: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--muted);
      max-height: 25vh;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="stopBtn" type="button">Stop loading (fade out)</button>
    <label><input type="checkbox" id="reduceMotionToggle" /> Enable reduce-motion</label>
    <label><input type="checkbox" id="overlayToggle" /> Visual fidelity overlay (red=reauthored, green=original)</label>
    <span class="info">Lotus splash prototype</span>
  </div>

  <main>
    <div class="splash" id="splash">
      <!-- The SVG is built by JS so we can keep the path-data and animation values
           in one place (and so we can re-use the data for the overlay/diff check). -->
      <svg
        id="lotusSvg"
        viewBox="0 0 180 120"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Loading"
        role="img">
        <g id="flower" fill="#818cf8">
          <!-- petal-pair groups injected here by JS -->
        </g>
      </svg>
    </div>
  </main>

  <pre class="console-out" id="consoleOut"></pre>

          const [rx1, ry1] = rotAbs(x1, y1);
          const [rx2, ry2] = rotAbs(x2, y2);
          const [rx, ry] = rotAbs(x, y);
          out.push(rx1, ry1, rx2, ry2, rx, ry);

          const [rdx2, rdy2] = rotRel(dx2, dy2);
          const [rdx, rdy] = rotRel(dx, dy);

    // ease-out cubic via `keySplines="0.25 0.1 0.25 1"` and `calcMode="spline"`.
    const CANONICAL_MAJOR_D = REAUTHORED[13];
    const CANONICAL_MINOR_D = REAUTHORED[16];
    const EASE_OUT_SPLINE = "0.25 0.1 0.25 1";

    function morphTargetMajor(idx) { return idx === 5 ? PAIR5_MAJOR_D : CANONICAL_MAJOR_D; }
    function morphTargetMinor(idx) { return idx === 5 ? PAIR5_MINOR_D : CANONICAL_MINOR_D; }

    for (const b of blooms) {
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("class", "pair pair-" + b.idx);
      const t = timingFor(b.idx);

      // Major path
      const majorPath = document.createElementNS(SVG_NS, "path");
      majorPath.setAttribute("d", REAUTHORED[b.major]);
      majorPath.setAttribute("class", "major reauthored");
      g.appendChild(majorPath);

      // Pair 1 has no morph (path13 IS canonical); pairs 2-5 morph to canonical
      // (or pre-rotated+translated canonical, in pair 5's case).
      if (b.idx !== 1) {
        const aD = document.createElementNS(SVG_NS, "animate");
        aD.setAttribute("attributeName", "d");
        aD.setAttribute("from", REAUTHORED[b.major]);
        aD.setAttribute("to", morphTargetMajor(b.idx));
        aD.setAttribute("dur", `${t.durMorphS.toFixed(4)}s`);
        aD.setAttribute("begin", `${t.beginMorphS.toFixed(4)}s`);
        aD.setAttribute("fill", "freeze");
        aD.setAttribute("calcMode", "spline");
        aD.setAttribute("keyTimes", "0;1");
        aD.setAttribute("keySplines", EASE_OUT_SPLINE);
        majorPath.appendChild(aD);
      }

      // Minor path
      const minorPath = document.createElementNS(SVG_NS, "path");
      minorPath.setAttribute("d", REAUTHORED[b.minor]);
      minorPath.setAttribute("class", "minor reauthored");
      g.appendChild(minorPath);

      if (b.idx !== 1) {
        const aDm = document.createElementNS(SVG_NS, "animate");
        aDm.setAttribute("attributeName", "d");
        aDm.setAttribute("from", REAUTHORED[b.minor]);
        aDm.setAttribute("to", morphTargetMinor(b.idx));
        aDm.setAttribute("dur", `${t.durMorphS.toFixed(4)}s`);
        aDm.setAttribute("begin", `${t.beginMorphS.toFixed(4)}s`);
        aDm.setAttribute("fill", "freeze");
        aDm.setAttribute("calcMode", "spline");
        aDm.setAttribute("keyTimes", "0;1");
        aDm.setAttribute("keySplines", EASE_OUT_SPLINE);
        minorPath.appendChild(aDm);
      }

      // Bloom motion: translate radially inward + rotate around pivot, on the
      // pair group, composed via additive="sum". Pair 5 doesn't move at the
      // group level (its morph target encodes its final position).
      //
      // Order is intentional: translate first (replace-mode), rotate second
      // (additive=sum). This produces the SVG string "translate(tx ty)
      // rotate(R cx cy)", which when applied to a point p computes
      // translate(rotate(p)) — i.e. rotate the petal to bloomed angle first,
      // THEN translate it radially inward in world space. See the long
      // explanation block above the loop for details.
      if (b.idx !== 5) {
        // 1) Translate radially inward by Δr along the bloomed angle.
        //    Document-order FIRST so it ends up on the LEFT of the SVG
        //    transform string (i.e. applied second to the point, which means
        //    AFTER the rotation has placed the petal at the bloomed angle).
        const aTr = document.createElementNS(SVG_NS, "animateTransform");
        aTr.setAttribute("attributeName", "transform");
        aTr.setAttribute("type", "translate");
        aTr.setAttribute("from", "0 0");
        aTr.setAttribute("to", `${b.translate.x.toFixed(4)} ${b.translate.y.toFixed(4)}`);
        aTr.setAttribute("dur", `${t.durMotionS.toFixed(4)}s`);
        aTr.setAttribute("begin", `${t.beginMotionS.toFixed(4)}s`);
        aTr.setAttribute("fill", "freeze");
        aTr.setAttribute("calcMode", "spline");
        aTr.setAttribute("keyTimes", "0;1");
        aTr.setAttribute("keySplines", EASE_OUT_SPLINE);
        g.appendChild(aTr);

        // 2) Rotate around pivot by the CW bloom delta. Document-order SECOND
        //    with additive="sum" so it post-multiplies onto the translate,
        //    landing on the RIGHT of the SVG transform string (applied first
        //    to the point — rotates the petal from canonical to bloomed angle).
        const aRot = document.createElementNS(SVG_NS, "animateTransform");
        aRot.setAttribute("attributeName", "transform");
        aRot.setAttribute("type", "rotate");
        aRot.setAttribute("from", `0 ${cx} ${cy}`);
        aRot.setAttribute("to", `${b.deltaDeg} ${cx} ${cy}`);
        aRot.setAttribute("dur", `${t.durMotionS.toFixed(4)}s`);
        aRot.setAttribute("begin", `${t.beginMotionS.toFixed(4)}s`);
        aRot.setAttribute("fill", "freeze");
        aRot.setAttribute("additive", "sum");
        aRot.setAttribute("calcMode", "spline");
        aRot.setAttribute("keyTimes", "0;1");
        aRot.setAttribute("keySplines", EASE_OUT_SPLINE);
        g.appendChild(aRot);
      }

      // Reduce-motion: when active, force the bloomed pose. Pair 5 has the
      // identity transform (its morph target already encodes the anchor
      // position). Pairs 1-4 receive a static "translate(...) rotate(...)"
      // matching the animated composition (translate on the LEFT, rotate on
      // the RIGHT — see the explanation above the loop).
      const bloomEnd = b.idx === 5
        ? `rotate(0 ${cx} ${cy})`
        : `translate(${b.translate.x.toFixed(4)} ${b.translate.y.toFixed(4)}) rotate(${b.deltaDeg} ${cx} ${cy})`;
      g.setAttribute("data-bloom-end", bloomEnd);

      // Overlay: a second copy of the original (un-reauthored) path, in green,
      // toggled visible by .overlay-on on body. Sits as a sibling inside the pair
      // so it transforms together when the user toggles overlay BEFORE bloom.
      const origMajor = document.createElementNS(SVG_NS, "path");
      origMajor.setAttribute("d", ORIGINALS[b.major]);
      origMajor.setAttribute("class", "overlay original-major");
      origMajor.setAttribute("fill", "#22c55e");
      origMajor.setAttribute("opacity", "0.5");
      g.appendChild(origMajor);

      const origMinor = document.createElementNS(SVG_NS, "path");
      origMinor.setAttribute("d", ORIGINALS[b.minor]);
      origMinor.setAttribute("class", "overlay original-minor");
      origMinor.setAttribute("fill", "#22c55e");
      origMinor.setAttribute("opacity", "0.5");
      g.appendChild(origMinor);

      // Re-tint reauthored paths red when overlay is on (CSS does this via
      // attribute selector; simpler to set a class).
      flower.appendChild(g);
    }

    // When overlay is on, recolor reauthored paths red @ 0.5 so they overlap
    // the green originals visibly. We do this with CSS using attribute selectors.
    const overlayStyle = document.createElement("style");
    overlayStyle.textContent = `
      body.overlay-on .splash svg .reauthored {
        fill: #ef4444 !important;
        opacity: 0.5;
      }
    `;
    document.head.appendChild(overlayStyle);

    // ===== Reduce-motion: force bloomed pose ==================================
    // When data-reduce-motion=on, we set the static transform on each pair group
    // so it appears in its bloomed position. (The <animateTransform> is hidden
    // by CSS.) We also need to force the partial paths to their canonical d.
    const reduceMotionStyleApply = () => {
      const on = document.documentElement.dataset.reduceMotion === "on";
      for (const b of blooms) {
        const pairG = flower.querySelector(`.pair-${b.idx}`);
        if (!pairG) continue;
        if (on) {
          pairG.setAttribute("transform", pairG.getAttribute("data-bloom-end"));
          // Force the bloomed-shape d on every pair's paths.
          // Pair 5 uses its pre-rotated canonical; everyone else uses raw canonical.
          pairG.querySelector(".major.reauthored").setAttribute("d", morphTargetMajor(b.idx));
          pairG.querySelector(".minor.reauthored").setAttribute("d", morphTargetMinor(b.idx));
        } else {
          pairG.removeAttribute("transform");
          // Restore reauthored partial d so the bloom can replay.
          pairG.querySelector(".major.reauthored").setAttribute("d", REAUTHORED[b.major]);
          pairG.querySelector(".minor.reauthored").setAttribute("d", REAUTHORED[b.minor]);
        }
      }
    };

    // ===== Wiring ==============================================================
    const splash = document.getElementById("splash");
    const stopBtn = document.getElementById("stopBtn");
    const reduceMotionToggle = document.getElementById("reduceMotionToggle");
    const overlayToggle = document.getElementById("overlayToggle");
    const out = document.getElementById("consoleOut");

    function log(...args) {
      const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ");
      out.textContent += line + "\n";
      console.log(...args);
    }

    stopBtn.addEventListener("click", () => {
      splash.classList.toggle("fading");
      stopBtn.textContent = splash.classList.contains("fading")
        ? "Restore (un-fade)"
        : "Stop loading (fade out)";
    });

    reduceMotionToggle.addEventListener("change", () => {
      if (reduceMotionToggle.checked) {
        document.documentElement.dataset.reduceMotion = "on";
      } else {
        delete document.documentElement.dataset.reduceMotion;
      }
      reduceMotionStyleApply();
      if (!reduceMotionToggle.checked) {
        // Replay the bloom + spin from t=0 for review
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    overlayToggle.addEventListener("change", () => {
      document.body.classList.toggle("overlay-on", overlayToggle.checked);
      // When overlay is on, force pairs back to at-rest pose so reauthored vs
      // original can be visually compared. When overlay is off, restart the
      // SVG animations from time 0 so the bloom + spin replay.
      if (overlayToggle.checked) {
        flower.querySelectorAll(".pair").forEach(g => g.removeAttribute("transform"));
        for (const b of blooms) {
          const pairG = flower.querySelector(`.pair-${b.idx}`);
          if (!pairG) continue;
          pairG.querySelector(".major.reauthored").setAttribute("d", REAUTHORED[b.major]);
          pairG.querySelector(".minor.reauthored").setAttribute("d", REAUTHORED[b.minor]);
        }
      } else {
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    // Print computed pivot + per-pair bloom math.
    log("=== Lotus animation prototype ===");
    log(`Pivot (centroid of major-path start points): cx=${cx.toFixed(4)}, cy=${cy.toFixed(4)}`);
    log(`pair1Angle  = ${pair1Angle.toFixed(4)}°   (path13's M-point angle from pivot)`);
    log(`PAIR5_ANGLE = ${PAIR5_ANGLE.toFixed(4)}°  (anchor — pair 5 stays at its at-rest position)`);
    log("");
    log("Symmetric bloom radii (programmatically computed from path M-coords):");
    log(`  canonicalRadius = |path13.M − pivot| = ${canonicalRadius.toFixed(4)}  (the canonical petal lives here)`);
    log(`  targetRadius    = |path14.M − pivot| = ${targetRadius.toFixed(4)}  (all 5 pairs end here in bloom)`);
    log(`  deltaRadius     = canonicalRadius − targetRadius = ${deltaRadius.toFixed(4)}  (radial inward translation magnitude)`);
    log("");
    log("Per-pair bloom rotation + translation (rotation around pivot, then radial");
    log("inward translation by deltaRadius along the bloomedAngle). Pair 5 anchors the");
    log("cascade and does NOT animate at the group level — its morph target encodes both");
    log("the rotation and the translation directly.");
    log("Rotation formula: ((bloomedAngle − pair1Angle) mod 360 + 360) mod 360 (strict-CW).");
    log("Translation formula: (−deltaRadius·cos(bloomedAngle), −deltaRadius·sin(bloomedAngle)).");
    for (const b of blooms) {
      const note = b.idx === 5
        ? "  (NOT a group transform — pair 5 doesn't move; used to PRE-rotate+PRE-translate morph target)"
        : "";
      log(`  Pair ${b.idx} (major=path${b.major}, minor=path${b.minor}):`);
      log(`     current=${b.currentAngle.toFixed(4)}°  bloomed=${b.bloomedAngle.toFixed(4)}°  cwRotation=${b.deltaDeg.toFixed(4)}°${note}`);
      log(`     translate=(${b.translate.x.toFixed(4)}, ${b.translate.y.toFixed(4)})`);
    }
    log("");
    log("Pair 5 pre-rotated+translated canonical M-points (sanity check: pair 5's major");
    log("MUST land within ~0.5 units of path14.M (45.87, 112.05); minor near path15.M");
    log("(47.96, 100.95) — major+minor are kept rigid so minor offset is expected):");
    function firstMOf(d) {
      const m = d.match(/^\s*M\s*(-?\d*\.?\d+(?:e[-+]?\d+)?)\s+(-?\d*\.?\d+(?:e[-+]?\d+)?)/);
      return m ? { x: parseFloat(m[1]), y: parseFloat(m[2]) } : null;
    }
    const m5major = firstMOf(PAIR5_MAJOR_D);
    const m5minor = firstMOf(PAIR5_MINOR_D);
    const m5majorDist = Math.hypot(m5major.x - 45.87, m5major.y - 112.05);
    const m5minorDist = Math.hypot(m5minor.x - 47.96, m5minor.y - 100.95);
    log(`  Pre-transformed path13 M = (${m5major.x.toFixed(4)}, ${m5major.y.toFixed(4)})  vs  path14 M = (45.87, 112.05)  Δ = ${m5majorDist.toFixed(4)} units`);
    log(`  Pre-transformed path16 M = (${m5minor.x.toFixed(4)}, ${m5minor.y.toFixed(4)})  vs  path15 M = (47.96, 100.95)  Δ = ${m5minorDist.toFixed(4)} units`);
    if (m5majorDist > 0.5) {
      log(`  WARNING: pair 5 major M is ${m5majorDist.toFixed(4)} units from path14.M — should be within 0.5.`);
    }
    log("");
    log(`Cascade D = ${D.toFixed(4)}s (motion+morph dur per pair); δ = ${DELTA_S.toFixed(4)}s (cascade delay).`);
    log(`Total bloom = 3δ + D = ${BLOOM_TOTAL_S.toFixed(4)}s. Each pair's motion overlaps with the next (D > δ),`);
    log("producing a continuous wave rather than discrete steps.");
    log("Per-pair cascade timing (seconds):");
    for (const b of blooms) {
      const tt = timingFor(b.idx);
      const motionStr = b.idx === 5
        ? "(no group motion)"
        : `motion begin=${tt.beginMotionS.toFixed(4)}s dur=${tt.durMotionS.toFixed(4)}s`;
      const morphStr = b.idx === 1
        ? "(no morph)"
        : `morph begin=${tt.beginMorphS.toFixed(4)}s dur=${tt.durMorphS.toFixed(4)}s`;
      log(`  Pair ${b.idx}: ${motionStr} | ${morphStr}`);
    }
    log("");
    log(`Spin: dur=${SPIN_DUR_S.toFixed(4)}s/rev (1.5× original 4s), begin=${BLOOM_TOTAL_S.toFixed(4)}s (pair 4's motion-end).`);
  </script>
</body>
</html>
