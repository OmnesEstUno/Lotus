<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotus animation prototype</title>
  <!--
    Lotus splash animation prototype (Task 1).
    Standalone HTML — no React, no build step. Open at /lotus-animation-preview.html
    via the Vite dev server to evaluate the visual.

    Cross-browser note: per the design spec the main risk is Safari's historical
    weakness with SVG <animate attributeName="d"> path interpolation. Tested in
    whichever browsers are available locally; Safari verification is deferred to
    the user (we don't have Safari available in this environment).
  -->
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --fg: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #818cf8;
      --border: #27272a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }
    .controls {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      font-size: 14px;
    }
    .controls label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .controls button {
      background: var(--accent);
      color: #09090b;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    .controls button:hover { opacity: 0.9; }
    .controls .info {
      color: var(--muted);
      font-size: 12px;
      margin-left: auto;
    }
    .controls input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 60px 16px 16px;
    }

    .splash {
      transition: opacity 200ms ease-out;
      opacity: 1;
    }
    .splash.fading { opacity: 0; }

    /* Bloom + spin are both driven by SVG <animateTransform> elements (in
       viewBox user coordinates) injected by JS — see #flower below. CSS only
       handles fade-out and the reduce-motion pulse.

       Spin: 2.667s/revolution (= 4 / 1.5 — 1.5x faster than the original 4s)
       starting at the moment the cascade bloom finishes. The spin's `begin`
       attribute is set in JS based on BLOOM_TOTAL_S so they stay in sync. */
    .splash svg {
      width: 256px;
      height: auto;
      display: block;
    }

    /* Reduce-motion fallback: kill all SVG animations, force bloomed pose,
       gentle opacity pulse on the splash. */
    html[data-reduce-motion="on"] .splash svg animate,
    html[data-reduce-motion="on"] .splash svg animateTransform {
      display: none;
    }
    @keyframes lotus-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    html[data-reduce-motion="on"] .splash {
      animation: lotus-pulse 2s ease-in-out infinite;
    }

    /* Visual-fidelity overlay: shows originals (green) over reauthored (red) when toggled.
       Both at 50% opacity. At rest they should overlap perfectly.
       SMIL animations are hidden so the at-rest layout stays stable while comparing. */
    .splash svg .overlay { display: none; }
    body.overlay-on .splash svg .overlay { display: inline; }
    body.overlay-on .splash svg animate,
    body.overlay-on .splash svg animateTransform { display: none; }

    .console-out {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 8px 16px;
      background: rgba(9, 9, 11, 0.85);
      border-top: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 11px;
      color: var(--muted);
      max-height: 25vh;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="stopBtn" type="button">Stop loading (fade out)</button>
    <label><input type="checkbox" id="reduceMotionToggle" /> Enable reduce-motion</label>
    <label><input type="checkbox" id="overlayToggle" /> Visual fidelity overlay (red=reauthored, green=original)</label>
    <span class="info">Lotus splash prototype</span>
  </div>

  <main>
    <div class="splash" id="splash">
      <!-- The SVG is built by JS so we can keep the path-data and animation values
           in one place (and so we can re-use the data for the overlay/diff check). -->
      <svg
        id="lotusSvg"
        viewBox="0 0 180 120"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Loading"
        role="img">
        <g id="flower" fill="#818cf8">
          <!-- petal-pair groups injected here by JS -->
        </g>
      </svg>
    </div>
  </main>

  <pre class="console-out" id="consoleOut"></pre>

    // Petal pairs (Right -> Left). Each pair = [majorId, minorId].
    // Pair 1 is the rightmost — the only complete petal at rest, anchor for bloom.
    const PAIRS = [
      { idx: 1, major: 13, minor: 16 },
      { idx: 2, major: 18, minor: 22 },
      { idx: 3, major: 19, minor: 21 },
      { idx: 4, major: 17, minor: 20 },
      { idx: 5, major: 14, minor: 15 }
    ];

    // ===== Pivot + bloom-angle math ===========================================
    // Pivot = centroid of the start points (first M coordinate) of all five major
    // paths. This is the visual base of the petal fan, NOT the SVG bbox center.
    const MAJOR_STARTS = {
      13: { x: 124.76, y: 112.27 },
      18: { x: 89.19,  y: 78.89  },
      19: { x: 80.68,  y: 79.77  },
      17: { x: 68.87,  y: 88.40  },
      14: { x: 45.87,  y: 112.05 }
    };
    const cx = (MAJOR_STARTS[13].x + MAJOR_STARTS[18].x + MAJOR_STARTS[19].x + MAJOR_STARTS[17].x + MAJOR_STARTS[14].x) / 5;
    const cy = (MAJOR_STARTS[13].y + MAJOR_STARTS[18].y + MAJOR_STARTS[19].y + MAJOR_STARTS[17].y + MAJOR_STARTS[14].y) / 5;

    function angleOf(pt) {
      // SVG y is flipped vs. math; use atan2 directly — angles increase CW on screen.
      return Math.atan2(pt.y - cy, pt.x - cx) * 180 / Math.PI;
    }

    const pair1Angle = angleOf(MAJOR_STARTS[13]);

    // Bloom-rotation derivation (STRICT CW — no shortest-arc):
    //   The user wants every petal to rotate clockwise (positive degrees in SVG
    //   coordinate space). Each pair's total CW sweep is:
    //
    //     delta = ((target - current) mod 360 + 360) mod 360
    //
    //   where `current` is the pair's at-rest angle (atan2 of its major-path
    //   start point relative to the pivot) and `target` is pair1Angle - (N-1)*72°.
    //
    //   Note: this differs from the previous implementation, which used
    //   shortest-arc normalization to [-180, 180]. That made some pairs spin
    //   CCW. The user has explicitly chosen strict-CW.
    const blooms = PAIRS.map(p => {
      const start = MAJOR_STARTS[p.major];
      const current = angleOf(start);
      const target = pair1Angle - (p.idx - 1) * 72;
      // Strict-CW delta in [0, 360). Pair 1's target == its current, so delta == 0
      // and pair 1 doesn't move (correct — pair 1 is the anchor).
      let delta = ((target - current) % 360 + 360) % 360;
      return { ...p, currentAngle: current, targetAngle: target, deltaDeg: delta };
    });

    // ===== Cascade timing =====================================================
    // The bloom is now a sequential cascade rather than a concurrent rotation.
    // - At t = 0       : pair 5 begins rotating CW. Pairs 4 and 5 begin morphing.
    // - At t = T       : pair 4 begins rotating CW. Pair 3 begins morphing.
    //                    (Pair 5 has now swept 72° CW, clearing pair 4's slot.)
    // - At t = 2T      : pair 3 begins rotating CW. Pair 2 begins morphing.
    // - At t = 3T      : pair 2 begins rotating CW.
    // All pairs share the SAME angular velocity (72° per T seconds), so each
    // pair's rotation duration is (deltaDeg / 72) * T.
    //
    // Total bloom time is the latest pair-finish time:
    //   pair 5 finishes at  0  + delta5/72 * T
    //   pair 4 finishes at  T  + delta4/72 * T
    //   pair 3 finishes at  2T + delta3/72 * T
    //   pair 2 finishes at  3T + delta2/72 * T
    // We pick T so the latest pair-finish lands at ~1.2s (matching the previous
    // bloom duration), then drive both the spin's begin attribute and any
    // dependent timing from BLOOM_TOTAL_S.
    const BLOOM_TARGET_S = 1.2;
    const cascadeStartByIdx = { 5: 0, 4: 1, 3: 2, 2: 3 }; // in units of T
    let latestUnitsT = 0;
    for (const b of blooms) {
      if (b.idx === 1) continue;
      const startUnits = cascadeStartByIdx[b.idx];
      const motionUnits = b.deltaDeg / 72;
      const finishUnits = startUnits + motionUnits;
      if (finishUnits > latestUnitsT) latestUnitsT = finishUnits;
    }

    const BLOOM_TOTAL_S = latestUnitsT * T; // == BLOOM_TARGET_S

    //   beginMotionS  = cascadeStartByIdx[idx] * T
    //   durMotionS    = (deltaDeg / 72) * T
    //   beginMorphS   = (idx === 5 || idx === 4) ? 0
    //                  : (idx === 3) ? T
    //                  : (idx === 2) ? 2T : (n/a — pair 1 doesn't morph)
    //   durMorphS     = T (the morph fills in over one 72°-step of the cascade)
    function timingFor(idx, deltaDeg) {
      if (idx === 1) return null; // pair 1 is static
      const beginMotionS = cascadeStartByIdx[idx] * T;
      const durMotionS = (deltaDeg / 72) * T;
      let beginMorphS;
      if (idx === 5 || idx === 4) beginMorphS = 0;
      else if (idx === 3) beginMorphS = T;
      else /* idx === 2 */ beginMorphS = 2 * T;
      const durMorphS = T;
      return { beginMotionS, durMotionS, beginMorphS, durMorphS };
    }

    // ===== Build the SVG ======================================================
    const SVG_NS = "http://www.w3.org/2000/svg";
    const flower = document.getElementById("flower");
    const svg = document.getElementById("lotusSvg");

    // Continuous spin: an <animateTransform> on the #flower group, rotating
    // 0->360 around the pivot, 2.667s per revolution (= 4 / 1.5 — 1.5x faster
    // than the original 4s), infinite, beginning the instant the cascade bloom
    // finishes (BLOOM_TOTAL_S, ~1.2s).
    const SPIN_DUR_S = 4 / 1.5; // 2.6667
    const spin = document.createElementNS(SVG_NS, "animateTransform");
    spin.setAttribute("attributeName", "transform");
    spin.setAttribute("type", "rotate");
    spin.setAttribute("from", `0 ${cx} ${cy}`);
    spin.setAttribute("to", `360 ${cx} ${cy}`);
    spin.setAttribute("dur", `${SPIN_DUR_S.toFixed(4)}s`);
    spin.setAttribute("begin", `${BLOOM_TOTAL_S.toFixed(4)}s`);
    spin.setAttribute("repeatCount", "indefinite");
    flower.appendChild(spin);

    // For each pair, create a <g class="pair"> that holds:
    //   - the major path with an <animate> from reauthored -> canonical
    //   - the minor path with an <animate> from reauthored -> canonical
    //   - an <animateTransform> rotate that runs the bloom delta over its
    //     own cascade-determined duration with an ease-out cubic.
    // The rotation is applied to the <g> so the entire pair (major + minor)
    // moves together and the petal interpolation happens in pair-local coords.
    //
    // Cascade timing (see comments above for derivation):
    //   - Pair 5 starts rotating at t=0; pair 5 morph and pair 4 morph also at t=0.
    //   - Pair 4 starts rotating at t=T;   pair 3 morph at t=T.
    //   - Pair 3 starts rotating at t=2T;  pair 2 morph at t=2T.
    //   - Pair 2 starts rotating at t=3T.
    //   - All morphs run for duration T, all rotations run for (delta/72)*T.
    //
    // ease-out cubic via `keySplines="0.25 0.1 0.25 1"` and `calcMode="spline"`.
    const CANONICAL_MAJOR_D = REAUTHORED[13];
    const CANONICAL_MINOR_D = REAUTHORED[16];
    const EASE_OUT_SPLINE = "0.25 0.1 0.25 1";

    for (const b of blooms) {
      const g = document.createElementNS(SVG_NS, "g");
      g.setAttribute("class", "pair pair-" + b.idx);
      const t = timingFor(b.idx, b.deltaDeg); // null for pair 1

      // Major path
      const majorPath = document.createElementNS(SVG_NS, "path");
      majorPath.setAttribute("d", REAUTHORED[b.major]);
      majorPath.setAttribute("class", "major reauthored");
      g.appendChild(majorPath);

      if (b.major !== 13) {
        const aD = document.createElementNS(SVG_NS, "animate");
        aD.setAttribute("attributeName", "d");
        aD.setAttribute("from", REAUTHORED[b.major]);
        aD.setAttribute("to", CANONICAL_MAJOR_D);
        aD.setAttribute("dur", `${t.durMorphS.toFixed(4)}s`);
        aD.setAttribute("begin", `${t.beginMorphS.toFixed(4)}s`);
        aD.setAttribute("fill", "freeze");
        aD.setAttribute("calcMode", "spline");
        aD.setAttribute("keyTimes", "0;1");
        aD.setAttribute("keySplines", EASE_OUT_SPLINE);
        majorPath.appendChild(aD);
      }

      // Minor path
      const minorPath = document.createElementNS(SVG_NS, "path");
      minorPath.setAttribute("d", REAUTHORED[b.minor]);
      minorPath.setAttribute("class", "minor reauthored");
      g.appendChild(minorPath);

      if (b.minor !== 16) {
        const aDm = document.createElementNS(SVG_NS, "animate");
        aDm.setAttribute("attributeName", "d");
        aDm.setAttribute("from", REAUTHORED[b.minor]);
        aDm.setAttribute("to", CANONICAL_MINOR_D);
        aDm.setAttribute("dur", `${t.durMorphS.toFixed(4)}s`);
        aDm.setAttribute("begin", `${t.beginMorphS.toFixed(4)}s`);
        aDm.setAttribute("fill", "freeze");
        aDm.setAttribute("calcMode", "spline");
        aDm.setAttribute("keyTimes", "0;1");
        aDm.setAttribute("keySplines", EASE_OUT_SPLINE);
        minorPath.appendChild(aDm);
      }

      // Bloom rotation transform on the pair group.
      // Rotate around (cx, cy) so each petal swings around the lotus base.
      // Pair 1 has deltaDeg=0 and never moves — we skip emitting an animateTransform
      // for it entirely (the previous "no-op for symmetry" wasted SMIL time).
      if (b.idx !== 1) {
        const at = document.createElementNS(SVG_NS, "animateTransform");
        at.setAttribute("attributeName", "transform");
        at.setAttribute("type", "rotate");
        at.setAttribute("from", `0 ${cx} ${cy}`);
        at.setAttribute("to", `${b.deltaDeg} ${cx} ${cy}`);
        at.setAttribute("dur", `${t.durMotionS.toFixed(4)}s`);
        at.setAttribute("begin", `${t.beginMotionS.toFixed(4)}s`);
        at.setAttribute("fill", "freeze");
        at.setAttribute("calcMode", "spline");
        at.setAttribute("keyTimes", "0;1");
        at.setAttribute("keySplines", EASE_OUT_SPLINE);
        g.appendChild(at);
      }

      // Reduce-motion: when active, force the bloomed pose by adding a static
      // transform attribute. The animate elements are display:none'd via CSS so
      // they won't override.
      g.setAttribute("data-bloom-end", `rotate(${b.deltaDeg} ${cx} ${cy})`);

      // Overlay: a second copy of the original (un-reauthored) path, in green,
      // toggled visible by .overlay-on on body. Sits as a sibling inside the pair
      // so it transforms together when the user toggles overlay BEFORE bloom.
      const origMajor = document.createElementNS(SVG_NS, "path");
      origMajor.setAttribute("d", ORIGINALS[b.major]);
      origMajor.setAttribute("class", "overlay original-major");
      origMajor.setAttribute("fill", "#22c55e");
      origMajor.setAttribute("opacity", "0.5");
      g.appendChild(origMajor);

      const origMinor = document.createElementNS(SVG_NS, "path");
      origMinor.setAttribute("d", ORIGINALS[b.minor]);
      origMinor.setAttribute("class", "overlay original-minor");
      origMinor.setAttribute("fill", "#22c55e");
      origMinor.setAttribute("opacity", "0.5");
      g.appendChild(origMinor);

      // Re-tint reauthored paths red when overlay is on (CSS does this via
      // attribute selector; simpler to set a class).
      flower.appendChild(g);
    }

    // When overlay is on, recolor reauthored paths red @ 0.5 so they overlap
    // the green originals visibly. We do this with CSS using attribute selectors.
    const overlayStyle = document.createElement("style");
    overlayStyle.textContent = `
      body.overlay-on .splash svg .reauthored {
        fill: #ef4444 !important;
        opacity: 0.5;
      }
    `;
    document.head.appendChild(overlayStyle);

    // ===== Reduce-motion: force bloomed pose ==================================
    // When data-reduce-motion=on, we set the static transform on each pair group
    // so it appears in its bloomed position. (The <animateTransform> is hidden
    // by CSS.) We also need to force the partial paths to their canonical d.
    const reduceMotionStyleApply = () => {
      const on = document.documentElement.dataset.reduceMotion === "on";
      flower.querySelectorAll(".pair").forEach(g => {
        if (on) {
          g.setAttribute("transform", g.getAttribute("data-bloom-end"));
        } else {
          g.removeAttribute("transform");
        }
      });
      // Force complete shape on partial paths
      flower.querySelectorAll(".major.reauthored").forEach(p => {
        if (on) p.setAttribute("d", CANONICAL_MAJOR_D);
        // When turning OFF, restore original reauthored d so the bloom can replay.
        // We need to know which pair this path belongs to. The simplest approach:
        // restore from its parent pair index.
      });
      flower.querySelectorAll(".minor.reauthored").forEach(p => {
        if (on) p.setAttribute("d", CANONICAL_MINOR_D);
      });
      if (!on) {
        // Restore reauthored path-data for replay
        for (const b of blooms) {
          const pairG = flower.querySelector(`.pair-${b.idx}`);
          if (!pairG) continue;
          pairG.querySelector(".major.reauthored").setAttribute("d", REAUTHORED[b.major]);
          pairG.querySelector(".minor.reauthored").setAttribute("d", REAUTHORED[b.minor]);
        }
      }
    };

    // ===== Wiring ==============================================================
    const splash = document.getElementById("splash");
    const stopBtn = document.getElementById("stopBtn");
    const reduceMotionToggle = document.getElementById("reduceMotionToggle");
    const overlayToggle = document.getElementById("overlayToggle");
    const out = document.getElementById("consoleOut");

    function log(...args) {
      const line = args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ");
      out.textContent += line + "\n";
      console.log(...args);
    }

    stopBtn.addEventListener("click", () => {
      splash.classList.toggle("fading");
      stopBtn.textContent = splash.classList.contains("fading")
        ? "Restore (un-fade)"
        : "Stop loading (fade out)";
    });

    reduceMotionToggle.addEventListener("change", () => {
      if (reduceMotionToggle.checked) {
        document.documentElement.dataset.reduceMotion = "on";
      } else {
        delete document.documentElement.dataset.reduceMotion;
      }
      reduceMotionStyleApply();
      if (!reduceMotionToggle.checked) {
        // Replay the bloom + spin from t=0 for review
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    overlayToggle.addEventListener("change", () => {
      document.body.classList.toggle("overlay-on", overlayToggle.checked);
      // When overlay is on, force pairs back to at-rest pose so reauthored vs
      // original can be visually compared. When overlay is off, restart the
      // SVG animations from time 0 so the bloom + spin replay.
      if (overlayToggle.checked) {
        flower.querySelectorAll(".pair").forEach(g => g.removeAttribute("transform"));
        for (const b of blooms) {
          const pairG = flower.querySelector(`.pair-${b.idx}`);
          if (!pairG) continue;
          pairG.querySelector(".major.reauthored").setAttribute("d", REAUTHORED[b.major]);
          pairG.querySelector(".minor.reauthored").setAttribute("d", REAUTHORED[b.minor]);
        }
      } else {
        try { svg.setCurrentTime(0); } catch (_) {}
      }
    });

    // Print computed pivot + per-pair bloom math.
    log("=== Lotus animation prototype ===");
    log(`Pivot (centroid of major-path start points): cx=${cx.toFixed(4)}, cy=${cy.toFixed(4)}`);
    log("");
    log("Pair angles + bloom rotation (degrees, SVG coordinate space — +Y is down,");
    log("so +rotation is clockwise on screen). All deltas are STRICT CW in [0, 360):");
    for (const b of blooms) {
      log(`  Pair ${b.idx} (major=path${b.major}, minor=path${b.minor}): current=${b.currentAngle.toFixed(4)}°  target=${b.targetAngle.toFixed(4)}°  cwDelta=${b.deltaDeg.toFixed(4)}°`);
    }
    log("");
    log(`Cascade T = ${T.toFixed(4)}s  (chosen so latest pair-finish lands at ~${BLOOM_TARGET_S}s)`);
    log(`Total bloom = ${BLOOM_TOTAL_S.toFixed(4)}s  (latestUnitsT = ${latestUnitsT.toFixed(4)} × T)`);
    log("Per-pair cascade timing (seconds):");
    for (const b of blooms) {
      if (b.idx === 1) {
        log(`  Pair 1: static (anchor — never moves, never morphs)`);
        continue;
      }
      const tt = timingFor(b.idx, b.deltaDeg);
      log(`  Pair ${b.idx}: motion begin=${tt.beginMotionS.toFixed(4)}s dur=${tt.durMotionS.toFixed(4)}s | morph begin=${tt.beginMorphS.toFixed(4)}s dur=${tt.durMorphS.toFixed(4)}s`);
    }
    log("");
    log(`Spin: dur=${SPIN_DUR_S.toFixed(4)}s/rev (1.5× original 4s), begin=${BLOOM_TOTAL_S.toFixed(4)}s.`);
  </script>
</body>
</html>
