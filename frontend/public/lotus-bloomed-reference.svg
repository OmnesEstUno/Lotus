  Lotus splash animation — fully-bloomed reference.

  This is the static end-state that the bloom animation should produce. It is
  the bloomed state captured from commit f9ae0ae of `lotus-animation-preview.html`.

  Geometry:
    Pivot (rotation center): (81.874, 94.276) — centroid of the five major
      paths' M-points in favicon.svg's at-rest layout.
    All five pair groups use the SAME canonical major (path13's d) and SAME
      canonical minor (path16's d), each rotated around the pivot to the angle
      that places its anchor at the pair's bloom position.

  Rotations (CW around pivot):
    Pair 1:  +58.9641°
    Pair 2: -13.0359°  (= +346.9641° mod 360)
    Pair 3: -85.0359°  (= +274.9641°)
    Pair 4: -157.0359° (= +202.9641°)
    Pair 5: +130.9641°

  Bloom angles (where each pair's anchor M lands), evenly 72° apart:
    Pair 1: +81.7259°
    Pair 2:  +9.7259°
    Pair 3: -62.2741°
    Pair 4: -134.2741°
    Pair 5: +153.7259°  (this is path14's at-rest angle from pivot — pair 5
