name = "lotus-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "FINANCE_KV"
id = "ddbca44da4b548c8b9d918d542475468"

[vars]
ALLOWED_ORIGIN = "https://omnesestuno.github.io"
# WebAuthn relying party: replace with your production domain before deploy.
# RP_ID is the host (no scheme, no path); RP_ORIGIN is the full origin.
RP_ID = "omnesestuno.github.io"
RP_ORIGIN = "https://omnesestuno.github.io"

# Secrets (set via `wrangler secret put <NAME>`):
#   JWT_SECRET            — signing key for session tokens
#   ADMIN_INIT_SECRET     — one-time bootstrap gate for POST /api/admin/init.
#                           After first successful admin creation, this secret
#                           can be deleted (the endpoint self-disables once
#                           users:admin:profile exists).
# Run `wrangler kv namespace create FINANCE_KV` to create the KV namespace
